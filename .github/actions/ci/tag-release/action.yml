name: "Tag and push to GitHub"
description: "Tag and push to GitHub"

runs:
  using: "composite"
  steps:
  - name: Checkout
    uses: actions/checkout@v2
    with:
      fetch-depth: 0

  - name: Setup .NET SDK
    uses: actions/setup-dotnet@v4
    with:
      # nbgv is pre-installed on the runner image as a .NET 10 build, and
      # `dotnet tool update` won't downgrade it to the pinned toolVersion,
      # so a .NET 10 runtime must be present or `nbgv get-version` fails
      # (exit 150). Keep 9.0.300 for parity with the rest of CI.
      dotnet-version: |
        9.0.300
        10.0.x

  - uses: dotnet/nbgv@f088059084cb5d872e9d1a994433ca6440c2bf72 # v0.4.2
    name: NBGV
    id: nbgv
    with:
      toolVersion: 3.10.91
      setAllVars: true

  - name: "Tag and push to GitHub"
    shell: pwsh
    run: |
      git config user.email "info@platform.uno"
      git config user.name "Uno DevOps"
      git tag $env:NBGV_SemVer2
      git push origin $env:NBGV_SemVer2